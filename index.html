<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="בידרנט משימות" />
  <title>בידרנט · משימות ועדכונים</title>

  <!-- Favicons — דסקטופ, אנדרואיד, iOS -->
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="16x16"  href="./icon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32"  href="./icon-32.png" />
  <link rel="icon" type="image/png" sizes="48x48"  href="./icon-48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="mask-icon" href="./icon-512.png" color="#013d19" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#d7ff00" />
  <meta name="msapplication-TileColor" content="#d7ff00" />
  <meta name="msapplication-TileImage" content="./icon-192.png" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              green: '#013d19',   // ירוק כהה — צבע המותג
              lime:  '#d7ff00',   // ליים — פעולה ראשית
              mint:  '#deeece',   // ירקרק בהיר
              ink:   '#0a0a0a',
            }
          },
          fontFamily: { sans: ['Heebo', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    /* פונט המותג — PingHL-Regular על כל המערכת, בכל משקל */
    @font-face {
      font-family: 'Ping';
      src: url('./fonts/PingHL-Regular.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    /* הפונט על כל אלמנט במערכת — כולל שדות, כפתורים, placeholder ותאריכים */
    *, *::before, *::after,
    input, select, textarea, button, optgroup, option,
    ::placeholder, ::-webkit-datetime-edit, ::-webkit-file-upload-button {
      font-family: 'Ping', sans-serif !important;
    }

    body { margin: 0; direction: rtl; background: #fafafa; }

    /* שני משקלים בלבד: 400 רגיל, 700 עבה — כדי שלא ייווצר bold סינתטי מהפונט הרגיל */
    h1, h2, h3, h4, b, strong, .font-bold, .font-semibold, .font-medium {
      font-weight: 700;
    }
    .font-light, .font-normal { font-weight: 400; }
    #root { min-height: 100vh; }
    .app-loading {
      display:flex; align-items:center; justify-content:center; min-height:100vh;
      flex-direction:column; gap:1rem;
    }
    .app-loading .spinner {
      width:50px; height:50px; border:4px solid #e5e7eb; border-top-color:#013d19;
      border-radius:50%; animation:spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .drag-over { outline: 2px dashed #013d19; outline-offset: -3px; }

    /* מובייל: בלי גלילת גומי, בלי הדגשת מגע כחולה, גלילה חלקה */
    html { -webkit-text-size-adjust: 100%; }
    * { -webkit-tap-highlight-color: transparent; }
    @media (max-width: 900px) {
      body { overscroll-behavior-y: contain; }
      button, a, select, input, textarea { touch-action: manipulation; }
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 8px; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "htm": "https://esm.sh/htm@3.1.1",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <div class="app-loading">
      <div class="spinner"></div>
      <div style="color:#6b7280;">טוען את המערכת...</div>
    </div>
  </div>

  <script type="module" src="./app.js?v=1.3.1"></script>
</body>
</html>
